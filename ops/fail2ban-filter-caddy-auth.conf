# fail2ban — filtre des échecs d'authentification Caddy
#   cp ops/fail2ban-filter-caddy-auth.conf /etc/fail2ban/filter.d/caddy-auth.conf
#
# Matche les access logs JSON de Caddy : une réponse 401 sur /api/auth/login.
# Adapter la regex si le format de log Caddy diffère (versions / champs).
[Definition]
failregex = ^.*"remote_ip":"<HOST>".*"uri":"/api/auth/login".*"status":401.*$
            ^.*"status":401.*"uri":"/api/auth/login".*"remote_ip":"<HOST>".*$
ignoreregex =
