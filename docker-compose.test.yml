services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: quartierconnect_test
      POSTGRES_USER: quartierconnect
      POSTGRES_PASSWORD: test_password
    volumes:
      - postgres_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quartierconnect"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: test_password
      MONGO_INITDB_DATABASE: quartierconnect_test
    volumes:
      - mongo_test:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/test_password
    volumes:
      - neo4j_test:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-test:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    command: pnpm test:e2e --forceExit
    environment:
      NODE_ENV: test
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: quartierconnect
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: quartierconnect_test
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: root
      MONGO_PASSWORD: test_password
      MONGO_DB: quartierconnect_test
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test_password
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      SALT_ROUNDS: 4
      REFRESH_COOKIE_NAME: refresh_token
      REFRESH_COOKIE_PATH: /v1/auth/refresh
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_USER: test@test.local
      MAIL_FROM: no-reply@test.local
      MAIL_PASS: test
      OUTBOX_CONTINUOUS_ENABLED: false
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  api-unit:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    command: pnpm test --forceExit
    environment:
      NODE_ENV: test
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      OUTBOX_CONTINUOUS_ENABLED: false

  web-test:
    build:
      context: ./web-apps
      dockerfile: Dockerfile.dev
    command: pnpm test --run
    environment:
      NODE_ENV: test

volumes:
  postgres_test:
  mongo_test:
  neo4j_test:
