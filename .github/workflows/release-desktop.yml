name: Release Desktop

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de la release"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build + publish JAR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        working-directory: desktop-app
        run: ./mvnw -B clean package -DskipTests

      - name: Générer le changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publier sur GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.tag || github.ref_name }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: desktop-app/target/quartierconnect-desktop.jar
          generate_release_notes: true
          body: |
            ## QuartierConnect Desktop ${{ github.event.inputs.tag || github.ref_name }}

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.tag || github.ref_name }}/quartierconnect-desktop.jar
            java -jar quartierconnect-desktop.jar
            ```

            ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}