services:
  # =========================================================
  # DATABASES
  # =========================================================

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quartierconnect}
      POSTGRES_USER: ${POSTGRES_USER:-quartierconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quartierconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: quartierconnect
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:7474",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================
  # NEO4J INTERFACE
  # Browser interface is built in Neo4j service on :7474
  # =========================================================

  # =========================================================
  # API — NestJS hot reload
  # Seul src/ est monté : node_modules restent dans l'image
  # =========================================================

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    volumes:
      - ./api/src:/app/src
      - ./api/tsconfig.json:/app/tsconfig.json:ro
      - ./api/tsconfig.build.json:/app/tsconfig.build.json:ro
      - ./api/nest-cli.json:/app/nest-cli.json:ro
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB_USER: ${POSTGRES_USER:-quartierconnect}
      POSTGRES_DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB_NAME: ${POSTGRES_DB:-quartierconnect}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-root}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_DB: ${MONGO_DB:-quartierconnect}
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-prod}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      SALT_ROUNDS: ${SALT_ROUNDS:-10}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USER: ${MAIL_USER:-test}
      MAIL_PASS: ${MAIL_PASS:-test}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  # =========================================================
  # DRIZZLE STUDIO — PostgreSQL admin UI
  # =========================================================

  drizzle-studio:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    command: pnpm db:studio --host 0.0.0.0 --port 4983
    volumes:
      - ./api/src:/app/src
      - ./api/drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./api/tsconfig.json:/app/tsconfig.json:ro
    environment:
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB_USER: ${POSTGRES_USER:-quartierconnect}
      POSTGRES_DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB_NAME: ${POSTGRES_DB:-quartierconnect}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4983:4983"
    restart: unless-stopped

  # =========================================================
  # CLIENT — Vite dev server (port 5174)
  # Seul src/ et public/ sont montés pour le HMR
  # =========================================================

  client:
    build:
      context: ./web-apps
      dockerfile: Dockerfile.dev
    command: pnpm --filter client dev --host 0.0.0.0 --port 5174
    volumes:
      - ./web-apps/apps/client/index.html:/app/apps/client/index.html:ro
      - ./web-apps/apps/client/vite.config.ts:/app/apps/client/vite.config.ts:ro
      - ./web-apps/apps/client/src:/app/apps/client/src
      - ./web-apps/apps/client/public:/app/apps/client/public
      - ./web-apps/packages/ui/src:/app/packages/ui/src
    ports:
      - "5174:5174"
    restart: unless-stopped

  # =========================================================
  # BACK-OFFICE — Vite dev server (port 5173)
  # =========================================================

  back-office:
    build:
      context: ./web-apps
      dockerfile: Dockerfile.dev
    command: pnpm --filter back-office dev --host 0.0.0.0 --port 5173
    volumes:
      - ./web-apps/apps/back-office/index.html:/app/apps/back-office/index.html:ro
      - ./web-apps/apps/back-office/vite.config.ts:/app/apps/back-office/vite.config.ts:ro
      - ./web-apps/apps/back-office/src:/app/apps/back-office/src
      - ./web-apps/apps/back-office/public:/app/apps/back-office/public
      - ./web-apps/packages/ui/src:/app/packages/ui/src
    ports:
      - "5173:5173"
    restart: unless-stopped

  # =========================================================
  # MONGO INTERFACE — Mongo Express
  # =========================================================

  mongo-interface:
    image: mongo-express:latest
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-password}
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: unless-stopped

  # =========================================================
  # CADDY — Reverse proxy local (HTTPS auto-signé)
  # localhost        → client:5174
  # admin.localhost  → back-office:5173
  # api.localhost    → api:3000
  # =========================================================

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - client
      - back-office
    restart: unless-stopped

  # =========================================================
  # MAILPIT — Serveur mail de dev (catch-all SMTP)
  # UI : http://localhost:8025
  # =========================================================

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  caddy_data:
  caddy_config:
